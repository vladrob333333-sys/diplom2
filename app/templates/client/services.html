{% extends "base.html" %}
{% block title %}Мои услуги{% endblock %}
{% block content %}
<h2>Подключенные услуги</h2>
<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Название</th>
                <th>Описание</th>
                <th>Цена</th>
            </tr>
        </thead>
        <tbody>
            {% for service in services %}
            <tr>
                <td>{{ service.name }}</td>
                <td>{{ service.description }}</td>
                <td>{{ service.price }} руб.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
