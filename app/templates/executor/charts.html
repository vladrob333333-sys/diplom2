{% extends "base.html" %}
{% block title %}Мои диаграммы{% endblock %}
{% block head %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}
{% block content %}
<h2>Мои заявки: диаграммы</h2>
<div class="row">
    <div class="col-md-6">
        <canvas id="statusChart" width="400" height="400"></canvas>
    </div>
    <div class="col-md-6">
        <canvas id="monthlyChart" width="400" height="400"></canvas>
    </div>
</div>
<script>
    const statusCtx = document.getElementById('statusChart').getContext('2d');
    new Chart(statusCtx, {
        type: 'pie',
        data: {
            labels: {{ status_labels|tojson }},
            datasets: [{
                data: {{ status_data|tojson }},
                backgroundColor: ['#ffc107', '#0dcaf0', '#0d6efd', '#198754', '#6c757d', '#dc3545']
            }]
        }
    });

    const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
    new Chart(monthlyCtx, {
        type: 'line',
        data: {
            labels: {{ monthly|map(attribute=0)|list|tojson }},
            datasets: [{
                label: 'Количество заявок',
                data: {{ monthly|map(attribute=1)|list|tojson }},
                borderColor: '#0d6efd',
                fill: false
            }]
        }
    });
</script>
{% endblock %}
